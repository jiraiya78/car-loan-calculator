<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simple Car Loan Calculator</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="calculator-container">
            <h2>🚗 Car Loan Calculator</h2>

            <div class="input-group">
                <label for="car-price">Car Price ($):</label>
                <input type="number" id="car-price" value="30000" />
            </div>

            <div class="input-group">
                <label for="down-payment">Down Payment ($):</label>
                <input type="number" id="down-payment" value="5000" />
            </div>

            <div class="input-group">
                <label for="interest-rate">Interest Rate (%):</label>
                <input
                    type="number"
                    id="interest-rate"
                    value="4.5"
                    step="0.1"
                />
            </div>

            <div class="input-group">
                <label for="loan-term">Loan Term (Months):</label>
                <select id="loan-term">
                    <option value="36">36 Months (3 Years)</option>
                    <option value="48">48 Months (4 Years)</option>
                    <option value="60" selected>60 Months (5 Years)</option>
                    <option value="72">72 Months (6 Years)</option>
                </select>
            </div>

            <button onclick="calculateLoan()">Calculate</button>

            <div class="results">
                <h3>Estimated Monthly Payment:</h3>
                <div id="monthly-payment" class="payment-amount">$0.00</div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
